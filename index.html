<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Как не просрать лето ☀️</title>

<style>
body{
font-family:Arial,sans-serif;
background:#fffdf6;
margin:0;
padding:20px;
color:#333;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:18px;
max-width:700px;
margin:0 auto 30px;
line-height:1.6;
}

.progress-box{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.progress-bar{
height:20px;
background:#eee;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
background:#6fcf97;
width:0%;
transition:.3s;
}

.progress-text{
margin-top:10px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
gap:10px;
}

.day{
background:white;
border-radius:16px;
padding:20px;
text-align:center;
cursor:pointer;
font-size:22px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.2s;
}

.day:hover{
transform:translateY(-3px);
}

.day.done{
background:#dff6e5;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:white;
max-width:700px;
width:100%;
max-height:90vh;
overflow:auto;
padding:30px;
border-radius:24px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

textarea{
width:100%;
min-height:120px;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

input[type="checkbox"]{
transform:scale(1.5);
margin-right:10px;
}

.save-btn{
background:#6fcf97;
border:none;
padding:15px 25px;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Как не просрать лето ☀️</h1>

<p class="subtitle">
30 вопросов на июнь.
Каждый день открывай новую карточку, отвечай честно, выбирай маленькое действие и наблюдай, как меняется твоё лето.
</p>

<div class="progress-box">

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div class="progress-text" id="progressText"></div>

</div>

<div class="grid" id="daysGrid"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h2 id="dayTitle"></h2>

<h3 id="holiday"></h3>

<p id="question"></p>

<h4>Что приходит тебе в ответ?</h4>

<textarea id="answer"></textarea>

<h4>Какое действие я выбираю сегодня?</h4>

<textarea id="action"></textarea>

<label>
<input type="checkbox" id="done">
Сделано
</label>

<br><br>

<button class="save-btn" onclick="saveDay()">
Сохранить
</button>

</div>
</div>

<script>

const days = [

{
day:1,
holiday:"День защиты детей",
question:"Сегодня День защиты детей. Как ты прямо сейчас можешь защитить, обнять и порадовать своего внутреннего ребёнка? Чего он хочет от этого лета?"
},

{
day:2,
holiday:"День запуска бумажных змеев",
question:"В чём ты сегодня излишне контролируешь жизнь вместо того, чтобы поймать поток и расслабиться?"
},

{
day:3,
holiday:"Всемирный день прогулки",
question:"Можешь ли ты сегодня выйти на улицу на 20 минут без телефона, наушников и целей, чтобы просто заметить мир вокруг?"
},

{
day:4,
holiday:"День объятий с кошками",
question:"За что ты сейчас себя пилишь вместо того, чтобы бережно обнять?"
},

{
day:5,
holiday:"Всемирный день охраны окружающей среды",
question:"Что в твоём окружении пора экологично убрать из жизни?"
},

{
day:6,
holiday:"Пушкинский день",
question:"Какими словами ты разговариваешь с собой каждый день?"
},

{
day:7,
holiday:"Всемирный день заботы о себе",
question:"Какое одно действие ты сделаешь сегодня исключительно из любви к себе?"
},

{
day:8,
holiday:"Всемирный день океанов",
question:"Что помогает тебе сохранять внутреннюю глубину и покой?"
},

{
day:9,
holiday:"Международный день друзей",
question:"Стала ли ты сама себе лучшим другом?"
},

{
day:10,
holiday:"Всемирный день мороженого",
question:"Что сегодня станет твоим маленьким кайфом?"
},

{
day:11,
holiday:"День поиска новой звезды",
question:"Какую свою внутреннюю звезду ты гасишь?"
},

{
day:12,
holiday:"День России",
question:"От чего ты мечтаешь стать независимой?"
},

{
day:13,
holiday:"День уникальности",
question:"В чём твоя сила, которую ты боишься показать миру?"
},

{
day:14,
holiday:"День донора крови",
question:"Не отдаёшь ли ты сейчас слишком много энергии наружу?"
},

{
day:15,
holiday:"Всемирный день ветра",
question:"Куда дует ветер твоей жизни?"
},

{
day:16,
holiday:"День заботы о роде",
question:"Какие родовые установки мешают тебе кайфовать?"
},

{
day:17,
holiday:"День борьбы с засухой",
question:"Какая сфера твоей жизни сейчас похожа на пустыню?"
},

{
day:18,
holiday:"День пикника",
question:"Можешь ли ты сегодня замедлиться и почувствовать лето?"
},

{
day:19,
holiday:"День прогулки",
question:"В какую игру ты сейчас играешь в жизни?"
},

{
day:20,
holiday:"День защиты слонов",
question:"В какую клетку из страхов ты заперла свой масштаб?"
},

{
day:21,
holiday:"День йоги и солнцестояния",
question:"На что ты тратишь свою силу сегодня?"
},

{
day:22,
holiday:"День памяти и скорби",
question:"Что тебе нужно оплакать и отпустить?"
},

{
day:23,
holiday:"Олимпийский день",
question:"Ради какой медали ты сейчас бежишь?"
},

{
day:24,
holiday:"День фей",
question:"Какое одно изменение ты бы сделала прямо сейчас?"
},

{
day:25,
holiday:"День принятия особенностей",
question:"Что в себе ты до сих пор не можешь принять?"
},

{
day:26,
holiday:"День поддержки жертв пыток",
question:"Как ты сама себя сейчас пытаешь?"
},

{
day:27,
holiday:"День молодёжи",
question:"Что смелое ты хочешь попробовать этим летом?"
},

{
day:28,
holiday:"День CAPS LOCK",
question:"О чём твоё внутреннее Я уже кричит капслоком?"
},

{
day:29,
holiday:"День тропиков",
question:"Позволяешь ли ты себе жить в изобилии?"
},

{
day:30,
holiday:"День соцсетей",
question:"Сколько времени ты подарила своей жизни, а сколько чужим?"
}

];

const grid=document.getElementById('daysGrid');
let currentDay=1;

function renderDays(){

grid.innerHTML='';

days.forEach(item=>{

const saved=JSON.parse(localStorage.getItem('day'+item.day)||'{}');

const div=document.createElement('div');

div.className='day';

if(saved.done) div.classList.add('done');

div.innerHTML=item.day;

div.onclick=()=>openDay(item.day);

grid.appendChild(div);

});

updateProgress();
}

function openDay(day){

currentDay=day;

const data=days.find(d=>d.day===day);

const saved=JSON.parse(localStorage.getItem('day'+day)||'{}');

document.getElementById('dayTitle').innerText="День "+day;

document.getElementById('holiday').innerText=data.holiday;

document.getElementById('question').innerText=data.question;

document.getElementById('answer').value=saved.answer||'';

document.getElementById('action').value=saved.action||'';

document.getElementById('done').checked=saved.done||false;

document.getElementById('modal').style.display='flex';
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function saveDay(){

const data={
answer:document.getElementById('answer').value,
action:document.getElementById('action').value,
done:document.getElementById('done').checked
};

localStorage.setItem('day'+currentDay,JSON.stringify(data));

renderDays();

closeModal();
}

function updateProgress(){

let done=0;

days.forEach(item=>{

const saved=JSON.parse(localStorage.getItem('day'+item.day)||'{}');

if(saved.done) done++;

});

const percent=Math.round(done/30*100);

document.getElementById('progressFill').style.width=percent+'%';

document.getElementById('progressText').innerText=
`Пройдено ${done} из 30 дней • ${percent}% лета прожито осознанно`;
}

renderDays();

</script>

</body>
</html>
